<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Putanja za gornji zakrivljeni tekst (u smjeru kazaljke na satu) -->
    <path id="top-text-arc" d="M 90,250 A 160,160 0 0,1 410,250" fill="none" />
    <!-- Putanja za donji zakrivljeni tekst (okrenut kako treba) -->
    <path id="bottom-text-arc" d="M 410,250 A 160,160 0 0,1 90,250" fill="none" />
  </defs>

  <!-- Vanjski bijeli krug sa tankim crnim rubom -->
  <circle cx="250" cy="250" r="220" fill="#ffffff" stroke="#111111" stroke-width="10" />
  
  <!-- Unutrašnji debeli crni prsten -->
  <circle cx="250" cy="250" r="195" fill="none" stroke="#111111" stroke-width="14" />

  <!-- Gornji zakrivljeni tekst -->
  <text font-family="Arial, sans-serif" font-weight="900" font-size="21" letter-spacing="3">
    <textPath href="#top-text-arc" startOffset="50%" text-anchor="middle" fill="#111111">CYBERSECURITY • ELECTRONICS</textPath>
  </text>

  <!-- Donji zakrivljeni tekst -->
  <text font-family="Arial, sans-serif" font-weight="900" font-size="21" letter-spacing="3">
    <textPath href="#bottom-text-arc" startOffset="50%" text-anchor="middle" fill="#111111">SYSTEM ADMINISTRATION •</textPath>
  </text>

  <!-- Centralni crni krug -->
  <circle cx="250" cy="250" r="135" fill="#111111" />
  
  <!-- Unutrašnja tanka bijela linija u krugu -->
  <circle cx="250" cy="250" r="130" fill="none" stroke="#ffffff" stroke-width="4" />

  <!-- Središnje ikonice (Kućište, Monitor, Odvijač) -->
  <!-- Monitor -->
  <rect x="232" y="145" width="36" height="24" rx="2" fill="none" stroke="#ffffff" stroke-width="3" />
  <path d="M 245 169 L 245 176 L 255 176 L 255 169" fill="none" stroke="#ffffff" stroke-width="3" />
  <line x1="240" y1="176" x2="260" y2="176" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  <!-- Kućište -->
  <rect x="215" y="148" width="12" height="28" rx="1" fill="none" stroke="#ffffff" stroke-width="3" />
  <line x1="219" y1="171" x2="223" y2="171" stroke="#ffffff" stroke-width="2" />
  <!-- Odvijač -->
  <rect x="273" y="147" width="4" height="10" fill="#ffffff" rx="0.5" />
  <line x1="275" y1="157" x2="275" y2="176" stroke="#ffffff" stroke-width="2" />

  <!-- Tekst unutar crnog kruga: COMPUTER REPAIR -->
  <text x="250" y="198" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="11" text-anchor="middle" letter-spacing="1">COMPUTER REPAIR</text>

  <!-- Tekst unutar crnog kruga: WITH A SMILE -->
  <text x="250" y="322" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="10" text-anchor="middle" letter-spacing="1">WITH A SMILE</text>

  <!-- Sjena iza glavne bijele trake -->
  <rect x="15" y="218" width="470" height="72" fill="#000000" opacity="0.25" />

  <!-- Glavna vodoravna bijela traka -->
  <rect x="15" y="212" width="470" height="72" fill="#ffffff" stroke="#111111" stroke-width="10" />

  <!-- Glavni natpis: LUKA PIPLICA -->
  <text x="250" y="264" fill="#111111" font-family="Arial, sans-serif" font-weight="900" font-size="42" text-anchor="middle" letter-spacing="4">LUKA PIPLICA</text>
</svg>
